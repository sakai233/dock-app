<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>添加图标</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
      padding: 10px;
    }

    .dialog {
      width: 100%;
      height: 100%;
      background: rgba(30, 30, 30, 0.97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 24px;
      color: white;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      animation: dialogPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
    }

    @keyframes dialogPop {
      from {
        opacity: 0;
        transform: translateY(-15px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    h3 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    h3::before {
      content: '➕';
      font-size: 22px;
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: rgba(255, 255, 255, 0.6);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    .form-content {
      flex: 1;
      overflow-y: auto;
      padding-right: 8px;
      margin-right: -8px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 10px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      border-color: #4a9eff;
      box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.2);
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .file-input-group {
      display: flex;
      gap: 10px;
    }

    .file-input-group input {
      flex: 1;
    }

    .file-browse-btn {
      padding: 12px 16px;
      background: rgba(74, 158, 255, 0.15);
      border: 1px solid rgba(74, 158, 255, 0.3);
      border-radius: 10px;
      color: #4a9eff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .file-browse-btn:hover {
      background: rgba(74, 158, 255, 0.25);
      border-color: #4a9eff;
    }

    .icon-preview {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .icon-preview-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
      width: 100%;
      text-align: center;
    }

    .icon-preview-img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .icon-preview-emoji {
      font-size: 64px;
      line-height: 1;
      flex-shrink: 0;
    }

    .icon-preview-info {
      flex: 1;
      min-width: 0;
    }

    .icon-preview-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .icon-preview-path {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      word-break: break-all;
      line-height: 1.4;
    }

    .emoji-toggle {
      font-size: 12px;
      color: #4a9eff;
      cursor: pointer;
      margin-top: 10px;
      text-align: right;
    }

    .emoji-toggle:hover {
      text-decoration: underline;
    }

    .emoji-picker {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
      max-height: 140px;
      overflow-y: auto;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      margin-top: 10px;
    }

    .emoji-option {
      font-size: 20px;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      text-align: center;
      transition: all 0.15s ease;
    }

    .emoji-option:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: scale(1.2);
    }

    .emoji-option.selected {
      background: rgba(74, 158, 255, 0.3);
      box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.5);
    }

    .dialog-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .dialog-buttons button {
      padding: 10px 24px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
    }

    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .btn-confirm {
      background: linear-gradient(135deg, #4a9eff, #2d7dd2);
      color: white;
      box-shadow: 0 4px 12px rgba(74, 158, 255, 0.3);
    }

    .btn-confirm:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(74, 158, 255, 0.4);
    }

    .btn-confirm:active {
      transform: translateY(0);
    }

    .btn-confirm:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="dialog">
    <button class="close-btn" id="closeBtn">×</button>
    <h3>添加桌面图标</h3>

    <div class="form-content">
      <div class="form-group">
        <label>选择应用程序</label>
        <div class="file-input-group">
          <input type="text" id="iconPath" placeholder="点击浏览选择应用程序">
          <button class="file-browse-btn" id="browseBtn">📁 浏览</button>
        </div>
      </div>

      <div id="iconPreviewSection">
        <div class="icon-preview">
          <div class="icon-preview-empty">
            <span>📄</span>
            <span>选择应用程序后预览图标</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>图标名称</label>
        <input type="text" id="iconName" placeholder="输入图标名称">
      </div>

      <div class="form-group">
        <label>自定义图标 (可选)</label>
        <div class="emoji-toggle" id="emojiToggle">展开表情选择器 ▼</div>
        <div class="emoji-picker" id="emojiPicker" style="display: none;"></div>
      </div>
    </div>

    <div class="dialog-buttons">
      <button class="btn-cancel" id="cancelBtn">取消</button>
      <button class="btn-confirm" id="confirmBtn" disabled>添加</button>
    </div>
  </div>

  <script>
    const iconPathInput = document.getElementById('iconPath');
    const iconNameInput = document.getElementById('iconName');
    const browseBtn = document.getElementById('browseBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const closeBtn = document.getElementById('closeBtn');
    const emojiToggle = document.getElementById('emojiToggle');
    const emojiPicker = document.getElementById('emojiPicker');
    const iconPreviewSection = document.getElementById('iconPreviewSection');

    let selectedEmoji = null;
    let selectedFileIcon = null;
    let selectedFilePath = null;
    let emojiPickerOpen = false;

    const emojiList = [
      '💻', '📱', '🖥️', '📁', '📂', '⚙️', '🔧', '🛠️',
      '🌐', '📧', '💬', '📞', '📹', '🎮', '🎵', '🎬',
      '📷', '📸', '🖼️', '📚', '📖', '📝', '📋', '📌',
      '🗂️', '💾', '💿', '📀', '🎯', '🏆', '⭐', '🌟',
      '🔥', '💧', '❄️', '🌈', '🌙', '☀️', '🚀', '🛸'
    ];

    function initEmojiPicker() {
      emojiPicker.innerHTML = '';
      emojiList.forEach(emoji => {
        const div = document.createElement('div');
        div.className = 'emoji-option' + (selectedEmoji === emoji ? ' selected' : '');
        div.textContent = emoji;
        div.onclick = () => selectEmoji(emoji);
        emojiPicker.appendChild(div);
      });
    }

    function selectEmoji(emoji) {
      selectedEmoji = emoji;
      document.querySelectorAll('.emoji-option').forEach(el => {
        el.classList.toggle('selected', el.textContent === emoji);
      });
      updateIconPreview();
    }

    function toggleEmojiPicker() {
      emojiPickerOpen = !emojiPickerOpen;
      emojiPicker.style.display = emojiPickerOpen ? 'grid' : 'none';
      emojiToggle.textContent = emojiPickerOpen ? '收起表情选择器 ▲' : '展开表情选择器 ▼';
    }

    function updateIconPreview() {
      if (!selectedFilePath) {
        iconPreviewSection.innerHTML = `
          <div class="icon-preview">
            <div class="icon-preview-empty">
              <span>📄</span>
              <span>选择应用程序后预览图标</span>
            </div>
          </div>
        `;
        confirmBtn.disabled = true;
        return;
      }

      let iconHtml = '';
      if (selectedEmoji) {
        iconHtml = `<span class="icon-preview-emoji">${selectedEmoji}</span>`;
      } else if (selectedFileIcon) {
        iconHtml = `<img class="icon-preview-img" src="${selectedFileIcon}" alt="icon">`;
      } else {
        iconHtml = `<span class="icon-preview-emoji">📄</span>`;
      }

      iconPreviewSection.innerHTML = `
        <div class="icon-preview">
          ${iconHtml}
          <div class="icon-preview-info">
            <div class="icon-preview-name">${iconNameInput.value || '未命名'}</div>
            <div class="icon-preview-path">${selectedFilePath}</div>
          </div>
        </div>
      `;

      confirmBtn.disabled = !iconNameInput.value.trim();
    }

    function closeDialog() {
      if (window.electronAPI) {
        window.electronAPI.closeAddIcon();
      }
    }

    function addIcon() {
      const name = iconNameInput.value.trim();
      const path = iconPathInput.value.trim();

      if (!path || !name) return;

      let finalIcon = selectedEmoji || selectedFileIcon || '📄';

      if (window.electronAPI) {
        window.electronAPI.getIcons().then(icons => {
          const newId = icons.length > 0 ? Math.max(...icons.map(i => i.id)) + 1 : 1;
          icons.push({
            id: newId,
            name,
            icon: finalIcon,
            path,
            type: 'app'
          });
          return window.electronAPI.saveIcons(icons);
        }).then(() => {
          closeDialog();
        });
      }
    }

    browseBtn.addEventListener('click', async () => {
      if (window.electronAPI) {
        const result = await window.electronAPI.selectExeFile();
        if (result) {
          selectedFilePath = result.path;
          selectedFileIcon = result.icon;
          iconPathInput.value = result.path;

          if (!iconNameInput.value) {
            iconNameInput.value = result.name;
          }

          selectedEmoji = null;
          initEmojiPicker();
          updateIconPreview();
        }
      }
    });

    iconNameInput.addEventListener('input', () => {
      updateIconPreview();
    });

    emojiToggle.addEventListener('click', toggleEmojiPicker);

    cancelBtn.addEventListener('click', closeDialog);
    closeBtn.addEventListener('click', closeDialog);
    confirmBtn.addEventListener('click', addIcon);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeDialog();
      }
    });

    initEmojiPicker();
  </script>
</body>
</html>
