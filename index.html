<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dock App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --dock-bg: rgba(255, 255, 255, 0.06);
      --dock-blur: 20px;
      --icon-size: 48px;
      --color-glass-border: rgba(255, 255, 255, 0.1);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
      pointer-events: none;
    }

    .app-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 8px;
      pointer-events: none;
    }

    .dock-bar {
      position: relative;
      min-width: 200px;
      max-width: 90vw;
      padding: 8px 16px 16px;
      background: var(--dock-bg);
      backdrop-filter: blur(var(--dock-blur));
      -webkit-app-region: drag;
      -webkit-backdrop-filter: blur(var(--dock-blur));
      border: 1px solid var(--color-glass-border);
      border-top: none;
      border-radius: 0 0 50% 50% / 0 0 30px 30px;
      box-shadow: 0 8px 32px rgba(255, 255, 255, 0.4), 0 0 1px rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 8px;
      perspective: 800px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: auto;
    }

    .dock-bar.collapsed {
      padding: 4px 12px;
      height: 24px;
      min-width: 80px;
      max-width: 100%;
      border-radius: 0 0 12px 12px;
      border: none;
      box-shadow: none;
      opacity: 0.5;
    }

    .dock-bar.collapsed .icon-item,
    .dock-bar.collapsed .add-btn,
    .dock-bar.collapsed .settings-btn {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-10px) !important;
    }

    .left-actions, .right-actions {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    .icons-container {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      position: relative;
      z-index: 1;
      flex: 1;
      overflow: hidden;
    }

    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      flex-shrink: 0;
    }

    .icon-item:hover {
      transform: translateY(-12px) scale(1.15);
    }

    .icon-item.dragging {
      opacity: 0.5;
    }

    .icon-emoji {
      font-size: var(--icon-size);
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
      transition: transform 0.25s ease;
    }

    .icon-img {
      width: var(--icon-size);
      height: var(--icon-size);
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    }

    .icon-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.9);
      margin-top: 6px;
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      font-weight: 500;
    }

    .icon-item:hover .icon-label {
      opacity: 1;
    }

    .icon-item .remove-btn {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      background: rgba(255, 60, 60, 0.95);
      border-radius: 50%;
      color: white;
      font-size: 12px;
      font-weight: bold;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      transition: transform 0.2s ease;
    }

    .icon-item:hover .remove-btn {
      display: flex;
    }

    .icon-item .remove-btn:hover {
      transform: scale(1.2);
      background: rgba(255, 40, 40, 1);
    }

    .add-btn, .settings-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.9);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .add-btn:hover, .settings-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.15);
    }

    .add-btn:active, .settings-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="dock-bar collapsed" id="dockBar">
      <div class="left-actions">
        <button class="settings-btn" id="settingsBtn" title="设置">⚙️</button>
      </div>
      <div class="icons-container" id="iconsContainer"></div>
      <div class="right-actions">
        <button class="add-btn" id="addBtn" title="添加图标">➕</button>
      </div>
    </div>
  </div>

  <script>
    const dockBar = document.getElementById('dockBar');
    const iconsContainer = document.getElementById('iconsContainer');
    const addBtn = document.getElementById('addBtn');
    const settingsBtn = document.getElementById('settingsBtn');

    let settings = {};
    let icons = [];
    let centerIndex = 0;
    let isCollapsed = true;
    let hideTimeout = null;

    function applySettings() {
      const r = parseInt(settings.themeColor.slice(1, 3), 16);
      const g = parseInt(settings.themeColor.slice(3, 5), 16);
      const b = parseInt(settings.themeColor.slice(5, 7), 16);
      const alpha = settings.bgOpacity / 100;
      document.documentElement.style.setProperty('--dock-bg', `rgba(${r}, ${g}, ${b}, ${alpha})`);
      document.documentElement.style.setProperty('--dock-blur', `${settings.blurAmount}px`);
      document.documentElement.style.setProperty('--icon-size', `${settings.iconSize}px`);
      renderIcons();
    }

    function loadData() {
      if (window.electronAPI) {
        window.electronAPI.getSettings().then(s => {
          settings = s;
          if (!settings.themeColor || !settings.themeColor.startsWith('#')) {
            settings.themeColor = '#ffffff';
          }
          if (!settings.bgOpacity) settings.bgOpacity = 6;
          if (!settings.blurAmount) settings.blurAmount = 20;
          if (!settings.iconSize) settings.iconSize = 48;
          return window.electronAPI.getIcons();
        }).then(ic => {
          icons = ic;
          centerIndex = Math.floor(icons.length / 2);
          applySettings();
        });

        window.electronAPI.onDataUpdated((data) => {
          settings = data.settings;
          icons = data.icons;
          if (!settings.themeColor || !settings.themeColor.startsWith('#')) {
            settings.themeColor = '#ffffff';
          }
          if (!settings.bgOpacity) settings.bgOpacity = 6;
          if (!settings.blurAmount) settings.blurAmount = 20;
          if (!settings.iconSize) settings.iconSize = 48;
          applySettings();
        });
      } else {
        settings = { themeColor: '#ffffff', bgOpacity: 6, blurAmount: 20, iconSize: 48 };
        icons = [
          { id: 1, name: '此电脑', icon: '💻', path: 'explorer.exe', type: 'system' },
          { id: 2, name: '回收站', icon: '🗑️', path: 'shell:RecycleBinFolder', type: 'system' },
          { id: 3, name: '设置', icon: '⚙️', path: 'ms-settings:', type: 'system' }
        ];
        centerIndex = Math.floor(icons.length / 2);
        applySettings();
      }
    }

    function renderIcons() {
      iconsContainer.innerHTML = '';
      const visibleCount = Math.min(icons.length, 7);
      const startIdx = Math.max(0, Math.min(centerIndex - 3, icons.length - visibleCount));
      const visibleIcons = icons.slice(startIdx, startIdx + visibleCount);
      const localCenter = Math.floor(visibleCount / 2);

      visibleIcons.forEach((icon, idx) => {
        const offset = idx - localCenter;
        const absOffset = Math.abs(offset);
        const scale = 1 - (absOffset * 0.15);
        const translateY = absOffset * 10;
        const zIndex = 10 - absOffset;

        const iconItem = document.createElement('div');
        iconItem.className = 'icon-item';
        iconItem.style.transform = `translateY(${translateY}px) scale(${scale})`;
        iconItem.style.zIndex = zIndex;
        iconItem.draggable = true;
        iconItem.dataset.id = icon.id;

        let iconHtml = '';
        if (icon.icon && icon.icon.startsWith('data:image')) {
          iconHtml = `<img class="icon-img" src="${icon.icon}" alt="${icon.name}">`;
        } else {
          iconHtml = `<span class="icon-emoji">${icon.icon || '📄'}</span>`;
        }

        iconItem.innerHTML = `
          <span class="remove-btn" data-id="${icon.id}">×</span>
          ${iconHtml}
          <span class="icon-label">${icon.name}</span>
        `;

        iconItem.addEventListener('click', (e) => {
          if (e.target.classList.contains('remove-btn')) return;
          launchIcon(icon);
        });

        iconItem.querySelector('.remove-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          removeIcon(icon.id);
        });

        iconItem.addEventListener('dragstart', (e) => {
          iconItem.classList.add('dragging');
          e.dataTransfer.setData('text/plain', icon.id);
        });

        iconItem.addEventListener('dragend', () => {
          iconItem.classList.remove('dragging');
        });

        iconItem.addEventListener('dragover', (e) => {
          e.preventDefault();
        });

        iconItem.addEventListener('drop', (e) => {
          e.preventDefault();
          const draggedId = parseInt(e.dataTransfer.getData('text/plain'));
          const targetId = icon.id;
          reorderIcons(draggedId, targetId);
        });

        iconsContainer.appendChild(iconItem);
      });
    }

    async function launchIcon(icon) {
      if (window.electronAPI) {
        await window.electronAPI.launchPath(icon.path);
      } else {
        alert(`启动: ${icon.name}\n路径: ${icon.path}`);
      }
    }

    function removeIcon(id) {
      if (!confirm('确定要删除这个图标吗？')) return;
      icons = icons.filter(i => i.id !== id);
      if (centerIndex >= icons.length) centerIndex = Math.max(0, icons.length - 1);
      if (window.electronAPI) {
        window.electronAPI.saveIcons(icons);
      }
      renderIcons();
    }

    function reorderIcons(draggedId, targetId) {
      const draggedIdx = icons.findIndex(i => i.id === draggedId);
      const targetIdx = icons.findIndex(i => i.id === targetId);
      if (draggedIdx === -1 || targetIdx === -1) return;
      const [dragged] = icons.splice(draggedIdx, 1);
      icons.splice(targetIdx, 0, dragged);
      if (window.electronAPI) {
        window.electronAPI.saveIcons(icons);
      }
      renderIcons();
    }

    function expandDock() {
      clearTimeout(hideTimeout);
      isCollapsed = false;
      dockBar.classList.remove('collapsed');
    }

    function collapseDock() {
      hideTimeout = setTimeout(() => {
        isCollapsed = true;
        dockBar.classList.add('collapsed');
      }, 300);
    }

    dockBar.addEventListener('mouseenter', expandDock);
    dockBar.addEventListener('mouseleave', collapseDock);

    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (window.electronAPI) {
        window.electronAPI.openSettings();
      }
    });

    addBtn.addEventListener('click', () => {
      if (window.electronAPI) {
        window.electronAPI.openAddIcon();
      }
    });

    dockBar.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (e.deltaY > 0) {
        centerIndex = Math.min(icons.length - 1, centerIndex + 1);
      } else {
        centerIndex = Math.max(0, centerIndex - 1);
      }
      renderIcons();
    }, { passive: false });

    loadData();
  </script>
</body>
</html>
