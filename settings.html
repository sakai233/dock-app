<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
      padding: 10px;
    }

    .panel {
      width: 100%;
      height: 100%;
      background: rgba(30, 30, 30, 0.97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 24px;
      color: white;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      animation: panelSlideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
    }

    @keyframes panelSlideIn {
      from {
        opacity: 0;
        transform: translateY(-15px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    h3 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    h3::before {
      content: '⚙️';
      font-size: 22px;
    }

    .settings-content {
      flex: 1;
      overflow-y: auto;
      padding-right: 8px;
      margin-right: -8px;
    }

    .setting-item {
      margin-bottom: 24px;
    }

    .setting-item:last-of-type {
      margin-bottom: 0;
    }

    .setting-item label {
      display: block;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 10px;
      font-weight: 500;
    }

    .setting-item input[type="color"] {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: transparent;
      padding: 4px;
    }

    .setting-item input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      outline: none;
    }

    .setting-item input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #4a9eff, #2d7dd2);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(74, 158, 255, 0.4);
      transition: transform 0.2s ease;
    }

    .setting-item input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .setting-value {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 8px;
      text-align: right;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 24px 0;
    }

    .quit-btn {
      width: 100%;
      padding: 14px;
      background: rgba(255, 60, 60, 0.15);
      border: 1px solid rgba(255, 60, 60, 0.3);
      border-radius: 12px;
      color: #ff5555;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .quit-btn:hover {
      background: rgba(255, 60, 60, 0.25);
      border-color: rgba(255, 60, 60, 0.5);
      transform: translateY(-1px);
    }

    .quit-btn:active {
      transform: translateY(0);
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: rgba(255, 255, 255, 0.6);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="panel">
    <button class="close-btn" id="closeBtn">×</button>
    <h3>设置</h3>
    <div class="settings-content">
      <div class="setting-item">
        <label>主题颜色</label>
        <input type="color" id="themeColor" value="#ffffff">
      </div>
      <div class="setting-item">
        <label>背景透明度</label>
        <input type="range" id="bgOpacity" min="0" max="100" value="6">
        <div class="setting-value" id="bgOpacityValue">6%</div>
      </div>
      <div class="setting-item">
        <label>毛玻璃模糊程度</label>
        <input type="range" id="blurAmount" min="0" max="50" value="20">
        <div class="setting-value" id="blurAmountValue">20px</div>
      </div>
      <div class="setting-item">
        <label>图标大小</label>
        <input type="range" id="iconSize" min="24" max="80" value="48">
        <div class="setting-value" id="iconSizeValue">48px</div>
      </div>
      <div class="divider"></div>
      <button class="quit-btn" id="quitBtn">🚪 退出软件</button>
    </div>
  </div>

  <script>
    const themeColorInput = document.getElementById('themeColor');
    const bgOpacityInput = document.getElementById('bgOpacity');
    const blurAmountInput = document.getElementById('blurAmount');
    const iconSizeInput = document.getElementById('iconSize');
    const bgOpacityValue = document.getElementById('bgOpacityValue');
    const blurAmountValue = document.getElementById('blurAmountValue');
    const iconSizeValue = document.getElementById('iconSizeValue');
    const quitBtn = document.getElementById('quitBtn');
    const closeBtn = document.getElementById('closeBtn');

    let settings = {};

    function loadData() {
      if (window.electronAPI) {
        window.electronAPI.getSettings().then(s => {
          settings = s;
          if (!settings.themeColor || !settings.themeColor.startsWith('#')) {
            settings.themeColor = '#ffffff';
          }
          if (!settings.bgOpacity) settings.bgOpacity = 6;
          if (!settings.blurAmount) settings.blurAmount = 20;
          if (!settings.iconSize) settings.iconSize = 48;
          updateUI();
        });
      }
    }

    function updateUI() {
      themeColorInput.value = settings.themeColor;
      bgOpacityInput.value = settings.bgOpacity;
      blurAmountInput.value = settings.blurAmount;
      iconSizeInput.value = settings.iconSize;
      bgOpacityValue.textContent = settings.bgOpacity + '%';
      blurAmountValue.textContent = settings.blurAmount + 'px';
      iconSizeValue.textContent = settings.iconSize + 'px';
    }

    function saveSettings() {
      if (window.electronAPI) {
        window.electronAPI.saveSettings(settings);
      }
    }

    themeColorInput.addEventListener('input', (e) => {
      settings.themeColor = e.target.value;
      saveSettings();
    });

    bgOpacityInput.addEventListener('input', (e) => {
      settings.bgOpacity = parseInt(e.target.value);
      bgOpacityValue.textContent = settings.bgOpacity + '%';
      saveSettings();
    });

    blurAmountInput.addEventListener('input', (e) => {
      settings.blurAmount = parseInt(e.target.value);
      blurAmountValue.textContent = settings.blurAmount + 'px';
      saveSettings();
    });

    iconSizeInput.addEventListener('input', (e) => {
      settings.iconSize = parseInt(e.target.value);
      iconSizeValue.textContent = settings.iconSize + 'px';
      saveSettings();
    });

    quitBtn.addEventListener('click', () => {
      if (confirm('确定要退出 Dock App 吗？')) {
        if (window.electronAPI) {
          window.electronAPI.quitApp();
        }
      }
    });

    closeBtn.addEventListener('click', () => {
      if (window.electronAPI) {
        window.electronAPI.closeSettings();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (window.electronAPI) {
          window.electronAPI.closeSettings();
        }
      }
    });

    loadData();
  </script>
</body>
</html>
